name: Build Firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360   # 6 h limit; cold build ~3 h, warm ~15 min

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Host dependencies ─────────────────────────────────────────────────
      - name: Install Buildroot host dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential libncurses-dev bison flex libssl-dev \
            libelf-dev bc cpio rsync wget unzip git python3 \
            python3-pip python3-setuptools python3-wheel \
            dosfstools mtools genimage

      # ── Buildroot source ───────────────────────────────────────────────────
      - name: Cache Buildroot tarball
        id: cache-br-src
        uses: actions/cache@v4
        with:
          path: buildroot-src.tar.gz
          key: buildroot-2024.02.1

      - name: Download Buildroot 2024.02.1 LTS
        if: steps.cache-br-src.outputs.cache-hit != 'true'
        run: |
          wget -q \
            https://buildroot.org/downloads/buildroot-2024.02.1.tar.gz \
            -O buildroot-src.tar.gz

      - name: Extract Buildroot
        run: |
          tar -xf buildroot-src.tar.gz
          mv buildroot-2024.02.1 buildroot-tree

      # ── Toolchain + build cache ────────────────────────────────────────────
      - name: Compute defconfig hash (cache key)
        id: defhash
        run: echo "hash=$(sha256sum buildroot/configs/picam_defconfig | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore host toolchain cache
        id: cache-host
        uses: actions/cache@v4
        with:
          path: buildroot-tree/output/host
          key: br-host-${{ steps.defhash.outputs.hash }}
          restore-keys: |
            br-host-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-ccache
          key: br-ccache-${{ steps.defhash.outputs.hash }}-${{ github.sha }}
          restore-keys: |
            br-ccache-${{ steps.defhash.outputs.hash }}-
            br-ccache-

      # ── Configure ─────────────────────────────────────────────────────────
      - name: Configure Buildroot
        run: |
          cd buildroot-tree
          make \
            BR2_EXTERNAL="${GITHUB_WORKSPACE}/buildroot" \
            O=output \
            picam_defconfig

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build firmware
        run: |
          cd buildroot-tree
          make \
            BR2_EXTERNAL="${GITHUB_WORKSPACE}/buildroot" \
            O=output \
            BR2_CCACHE_DIR="$HOME/.buildroot-ccache" \
            BR2_JLEVEL=0 \
            all
        env:
          FORCE_UNSAFE_CONFIGURE: 1   # allow root in Actions container if needed

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload firmware image
        uses: actions/upload-artifact@v4
        with:
          name: picam-sdcard-${{ github.sha }}
          path: buildroot-tree/output/images/sdcard.img.gz
          retention-days: 30

      # ── Release (tags only) ────────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: buildroot-tree/output/images/sdcard.img.gz
          body: |
            ## Pi HD USB Camera Firmware ${{ github.ref_name }}

            ### Supported modes (native IMX477 sensor output)
            | Resolution | Frame rates |
            |------------|-------------|
            | 4056×3040  | 5, 10 fps   |
            | 2028×1520  | 10, 20, 30, 40 fps |
            | 2028×1080  | 10, 15, 24, 30, 50 fps |
            | 1332×990   | 30, 60, 90, 120 fps |

            ### Flash instructions
            ```bash
            gunzip -c sdcard.img.gz | sudo dd of=/dev/sdX bs=4M status=progress
            ```
            Connect the Pi Zero 2 W **USB OTG port** (not PWR) to your computer.
            Power the Pi from the **PWR port**.
