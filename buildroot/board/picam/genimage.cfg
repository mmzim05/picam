image boot.vfat {
    vfat {
        files = {
            "bcm2710-rpi-zero-2-w.dtb",
            "bcm2710-rpi-zero-2.dtb",
            "overlays/dwc2.dtbo",
            "overlays/imx477.dtbo",
            "start.elf",
            "fixup.dat",
            "bootcode.bin",
            "kernel8.img",
            "config.txt",
            "cmdline.txt",
        }
    }
    size = 32M
}

image sdcard.img {
    hdimage {
        gpt = false
    }

    partition boot {
        partition-type = 0xC       # FAT32 LBA
        bootable = true
        image = "boot.vfat"
    }

    partition rootfs {
        partition-type = 0x83      # Linux
        image = "rootfs.squashfs"
    }
}
